<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cant</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#33495a">
<link rel="apple-touch-icon" href="cant-icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Cant">
<style>
  :root {
    --bg: #eff1f2;
    --surface: #ffffff;
    --surface2: #e3e6e8;
    --border: #d7dcdf;
    --text: #20262b;
    --text-muted: #7b868d;
    --accent: #3d7a6e;
    --accent-light: #4f8c7f;
    --accent-bg: #dcebe6;
    --success: #2c5c51;
    --danger: #94504f;
    --primary: #33495a;
    --shadow: 0 2px 12px rgba(32,38,43,0.07);
    --shadow-lg: 0 8px 32px rgba(32,38,43,0.11);
    --radius: 12px;
    --transition: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 1px 8px rgba(26,23,20,0.06);
  }

  .logo {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.2rem;
    font-weight: 400;
    color: var(--text);
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  nav {
    display: flex;
    gap: 0.25rem;
  }

  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-muted);
    transition: var(--transition);
    letter-spacing: 0.02em;
  }

  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--primary); color: white; }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* PAGE TITLE */
  .page-header {
    margin-bottom: 2rem;
  }

  .page-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.9rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 0.2rem;
  }

  .page-title em {
    font-style: italic;
    color: var(--accent);
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* FORMULARI */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: var(--shadow);
    max-width: 680px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  input[type="text"],
  input[type="url"],
  select,
  textarea {
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.925rem;
    color: var(--text);
    background: var(--bg);
    transition: var(--transition);
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(61,122,110,0.08);
  }

  textarea { resize: vertical; min-height: 80px; }

  .form-actions {
    margin-top: 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
  }

  #btn-eliminar-modal {
    margin-left: auto;
  }

  .btn-vista { width:32px; height:32px; border-radius:6px; border:0.5px solid var(--border); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-muted); transition: var(--transition); }
  .btn-vista:hover { border-color: var(--primary); color: var(--primary); }
  .btn-vista.active { background: var(--surface); color: var(--text); }

  /* BOTONS */
  .btn {
    padding: 0.6rem 1.4rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    letter-spacing: 0.02em;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }

  .btn-primary {
    background: var(--primary);
    color: white;
  }
  .btn-primary:hover { background: #243642; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(36,54,66,0.25); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .btn-danger {
    background: none;
    color: var(--danger);
    border: 1px solid transparent;
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
  }
  .btn-danger:hover { background: #f1e6e5; border-color: var(--danger); }

  .btn-edit {
    background: none;
    color: var(--accent);
    border: 1px solid transparent;
    padding: 0.4rem 0.75rem;
    font-size: 0.8rem;
  }
  .btn-edit:hover { background: var(--accent-bg); border-color: var(--primary); }

  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

  /* MISSATGE D'ESTAT */
  .status-msg {
    display: none;
    padding: 0.7rem 1rem;
    border-radius: 6px;
    font-size: 0.875rem;
    font-weight: 500;
    margin-top: 1rem;
    margin-bottom: 1rem;
    max-width: 680px;
  }
  .status-msg.ok { background: #e2ebe9; color: var(--success); border: 1px solid #b9d2cb; display: block; }
  .status-msg.error { background: #f1e6e5; color: var(--danger); border: 1px solid #d9bfbe; display: block; }
  .status-msg.shake { animation: shake 0.4s ease-in-out; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-6px); }
    40%, 80% { transform: translateX(6px); }
  }
  .input-error { border-color: var(--danger) !important; background: #f1e6e5 !important; }

  /* === Seccions del modal d'edició unificat === */
  .edit-seccio {
    border-radius: 10px;
    padding: 1rem 1.1rem;
    margin-bottom: 1rem;
  }
  .edit-seccio-progres { background: var(--accent-bg); }
  .edit-seccio-dades { background: var(--surface2); }
  .edit-seccio-titol {
    font-size: 0.72rem;
    font-weight: 500;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 0 0 0.75rem;
  }
  .edit-seccio-titol-dades { color: var(--text-muted); }
  .edit-zona-perillosa {
    border-top: 0.5px solid #c7cdd0;
    margin-top: 0.75rem;
    padding-top: 0.75rem;
  }
  .edit-zona-perillosa .btn-danger { font-size: 0.85rem; padding: 0.45rem 0.9rem; }

  /* VISTA TUTORIALS */
  .filters-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1.75rem;
    align-items: center;
  }

  .filter-label {
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-right: 0.25rem;
  }

  .filter-chip {
    padding: 0.3rem 0.9rem;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    font-family: 'DM Sans', sans-serif;
    font-size: 1.0rem;
    cursor: pointer;
    transition: var(--transition);
    color: var(--primary);
    font-weight: 400;
  }

  .filter-chip:hover { border-color: var(--primary); color: var(--accent); }
  .filter-chip.active { background: var(--primary); border-color: var(--primary); color: white; font-weight: 500; }

  .search-box {
    margin-left: auto;
    position: relative;
  }

  .search-box input {
    padding: 0.4rem 0.9rem 0.4rem 2.2rem;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    background: var(--surface);
    color: var(--text);
    width: 200px;
    transition: var(--transition);
    outline: none;
  }

  .search-box input:focus {
    border-color: var(--primary);
    width: 240px;
    box-shadow: 0 0 0 3px rgba(61,122,110,0.08);
  }

  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.85rem;
    pointer-events: none;
  }

  /* GRID DE CARDS */
  .tutorials-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.25rem;
  }

  .tutorials-llista { display: flex; flex-direction: column; gap: 6px; }
  .fila-tutorial { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .fila-main { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; }
  .fila-main:hover { background: var(--surface2); }
  .fila-tutorial.obert { border-color: #c7cdd0; }
  .fila-tutorial.obert .fila-main { background: var(--surface2); }
  .fila-nom { flex: 1; font-size: 13px; font-weight: 500; color: var(--text); min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fila-chevron { transition: transform 0.2s; flex-shrink: 0; display: flex; align-items: center; }
  .fila-expandida { display: none; padding: 10px 14px 12px; border-top: 0.5px solid var(--border); }
  .fila-expandida.obert { display: block; }

  .tutorial-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    box-shadow: var(--shadow);
    transition: var(--transition);
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    position: relative;
  }

  .tutorial-card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    border-color: #c7cdd0;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }

  .card-nom {
    font-family: 'Libre Baskerville', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .card-video-nom {
    font-size: 0.875rem;
    color: var(--text);
    font-weight: 400;
    font-style: italic;
    line-height: 1.4;
  }

  .card-meta {
    display: grid;
    grid-template-columns: 20px 1fr;
    gap: 4px 8px;
    font-size: 0.8rem;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
  }

  .card-meta-icon {
    font-size: 14px;
    color: var(--accent);
    display: flex;
    align-items: center;
  }

  .card-meta-value {
    color: var(--text);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
  }

  .card-categoria {
    display: inline-block;
    padding: 0.15rem 0.6rem;
    background: #e2e7e9;
    color: var(--primary);
    border-radius: 10px;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1px solid rgba(51,73,90,0.25);
  }

  .card-comentari {
    font-size: 0.825rem;
    color: var(--text-muted);
    font-style: italic;
    padding-top: 0.25rem;
    border-top: 1px solid var(--surface2);
    line-height: 1.5;
  }

  .card-actions {
    display: flex;
    gap: 0.25rem;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--surface2);
    justify-content: flex-end;
  }

  .yt-link {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    color: var(--primary);
    text-decoration: none;
    font-size: 0.825rem;
    font-weight: 500;
    transition: var(--transition);
    margin-right: auto;
    padding: 0.4rem 0;
  }

  .yt-link:hover { color: #243642; }

  /* MINIATURA */
  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    object-fit: cover;
    border-radius: 6px;
    background: var(--surface2);
    display: block;
  }

  .card-thumb-placeholder {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--surface2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    font-size: 1.5rem;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-muted);
  }

  .empty-icon { font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-title { font-family: 'Libre Baskerville', serif; font-size: 1.15rem; font-weight: 400; color: var(--text); margin-bottom: 0.5rem; }
  .empty-text { font-size: 0.875rem; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .spinner {
    display: inline-block;
    width: 24px;
    height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-bottom: 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* MODAL D'EDICIÓ */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,23,20,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { transform: translateY(12px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-title {
    font-family: 'Libre Baskerville', serif;
    font-size: 1.25rem;
    font-weight: 400;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .card-franja { height: 6px; width: 100%; }
  .card-nota-sessio { font-size: 0.78rem; color: var(--text-muted); font-style: italic; padding: 5px 8px; border-left: 2px solid #D97706; background: #FFFBEB; margin: 4px 0; }
  .star-rating { display: flex; gap: 3px; margin: 4px 0 2px; }
  .star-rating .star { font-size: 18px; cursor: pointer; color: var(--border); transition: color 0.1s; line-height: 1; }
  .star-rating .star.on { color: #E8A000; }
  .card-stars { display: flex; gap: 2px; font-size: 14px; }
  .card-stars .star-on { color: #E8A000; }
  .card-stars .star-off { color: var(--border); }

  /* PORTADA INICI */
  .portada-inici {
    max-width: 520px;
    margin: 0 auto;
    padding: 56px 24px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .portada-data {
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  .portada-titol {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 2.1rem;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
    line-height: 1.3;
  }
  .portada-nom { color: var(--primary); }
  .portada-frase {
    font-family: 'Libre Baskerville', Georgia, serif;
    font-size: 0.9rem;
    color: var(--text-muted);
    font-style: italic;
    margin-bottom: 44px;
  }
  .portada-stats-row {
    display: flex;
    gap: 36px;
    align-items: center;
    margin-bottom: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 36px;
  }
  .portada-stat { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .portada-stat-num { font-size: 1.8rem; font-weight: 500; color: var(--primary); line-height: 1; }
  .portada-stat-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .portada-stat-sep { width: 1px; height: 40px; background: var(--border); }
  .portada-botons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .portada-btn-principal {
    background: var(--primary);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 500;
    padding: 12px 28px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    box-shadow: var(--shadow);
  }
  .portada-btn-principal:hover { background: #243642; transform: translateY(-1px); }
  .portada-btn-secundari {
    background: var(--surface);
    color: var(--text-muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 12px 24px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
  }
  .portada-btn-secundari:hover { background: var(--surface2); }
  .portada-stat-link {
    cursor: pointer;
    border-radius: 10px;
    padding: 0.4rem 0.75rem;
    transition: var(--transition);
  }
  .portada-stat-link:hover { background: rgba(36,54,66,0.07); }
  .portada-stat-link:hover .portada-stat-num { color: var(--primary); }

  /* ── CELEBRACIÓ ── */
  .celebracio-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 10000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .celebracio-overlay.actiu { display: flex; }
  .celebracio-box {
    background: var(--surface);
    border-radius: 18px;
    padding: 2rem 2rem 1.5rem;
    text-align: center;
    max-width: 320px;
    width: 88%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    position: relative;
    z-index: 1;
  }
  .celebracio-emoji { font-size: 3rem; margin-bottom: 0.5rem; }
  .celebracio-text {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.4;
    margin-bottom: 1.2rem;
  }
  .celebracio-btn {
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 0.6rem 1.6rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    cursor: pointer;
    transition: var(--transition);
  }
  .celebracio-btn:hover { background: #243642; }
  .confeti-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
  }

  .portada-peu {
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    width: 100%;
    font-size: 0.75rem;
    color: var(--text-muted);
    font-style: italic;
  }

  /* RESPONSIU */
  @media (max-width: 640px) {
    header { padding: 0 1rem; }
    main { padding: 1.25rem 1rem; }
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .tutorials-grid { grid-template-columns: 1fr; }
    .search-box { margin-left: 0; width: 100%; }
    .search-box input { width: 100%; }
    .filters-bar { gap: 0.4rem; }
  }
  /* PANTALLA CONTRASENYA */
  .password-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .password-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbz7JhShdLnhDRLz9DtlggscrZNauPSebNtD3eaJwuPUHw-QRmkWtazuOpwJOzwZZwdh/exec';

  // CONTRASENYA
  let autenticat = false;

  // Llegir paràmetres del Share Target directament aquí, abans de tot
  (function() {
    const params = new URLSearchParams(window.location.search);
    const urlCompartida = params.get('text') || params.get('url') || '';
    const titolCompartit = params.get('title') || '';
    if (urlCompartida) {
      sessionStorage.setItem('cant_share_url', urlCompartida);
      sessionStorage.setItem('cant_share_title', titolCompartit);
      history.replaceState({}, '', window.location.pathname);
    }

    if (localStorage.getItem('cant_auth')) {
      autenticat = true;
      document.getElementById('password-overlay').classList.add('hidden');
      const shareUrl = sessionStorage.getItem('cant_share_url');
      if (shareUrl) {
        const shareTitle = sessionStorage.getItem('cant_share_title') || '';
        sessionStorage.removeItem('cant_share_url');
        sessionStorage.removeItem('cant_share_title');
        carregarTutorials({ renderitzar: false }).then(() => {
          actualitzarPortadaStats();
          showViewDirect('afegir');
          setTimeout(() => {
            document.getElementById('f-url').value = shareUrl;
            detectarInfoVideo().then(() => {
              const nomEl = document.getElementById('f-nom-video');
              if (!nomEl.value.trim() && shareTitle) {
                nomEl.value = shareTitle;
              }
            });
          }, 100);
        });
      } else {
        carregarTutorials().then(actualitzarPortadaStats);
      }
    } else {
      document.getElementById('password-input').focus();
    }
  })();

  function verificarPassword() {
    const val = document.getElementById('password-input').value;
    if (val === '4030') {
      autenticat = true;
      localStorage.setItem('cant_auth', '1');
      document.getElementById('password-overlay').classList.add('hidden');
      const shareUrl = sessionStorage.getItem('cant_share_url');
      if (shareUrl) {
        const shareTitle = sessionStorage.getItem('cant_share_title') || '';
        sessionStorage.removeItem('cant_share_url');
        sessionStorage.removeItem('cant_share_title');
        carregarTutorials({ renderitzar: false }).then(() => {
          actualitzarPortadaStats();
          showViewDirect('afegir');
          setTimeout(() => {
            document.getElementById('f-url').value = shareUrl;
            detectarInfoVideo().then(() => {
              const nomEl = document.getElementById('f-nom-video');
              if (!nomEl.value.trim() && shareTitle) {
                nomEl.value = shareTitle;
              }
            });
          }, 100);
        });
      } else {
        carregarTutorials().then(actualitzarPortadaStats);
      }
    } else {
      document.getElementById('password-error').textContent = 'Contrasenya incorrecta. Torna-ho a intentar.';
      document.getElementById('password-input').value = '';
      document.getElementById('password-input').focus();
    }
  }

  let tutorials = [];
  let filtreActiu = 'tots';
  let vistaActual = 'cards';
  let filesObertes = new Set();

  function setVista(v) {
    vistaActual = v;
    document.getElementById('btn-vista-cards').classList.toggle('active', v === 'cards');
    document.getElementById('btn-vista-llista').classList.toggle('active', v === 'llista');
    renderTutorials();
  }
  let nomActualitzant = '';

  // NAVEGACIÓ
  function showView(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    event.target.classList.add('active');
    if (view === 'biblioteca') carregarTutorials();
    history.pushState({ view }, '', '');
  }

  function showViewDirect(view) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    const btn = document.querySelector(`.nav-btn[onclick="showView('${view}')"]`);
    if (btn) btn.classList.add('active');
    history.pushState({ view }, '', '');
    if (view === 'biblioteca') return carregarTutorials();
    return Promise.resolve();
  }

  // Botó enrere del mòbil
  history.pushState({ view: 'inici' }, '', '');
  window.addEventListener('popstate', () => {
    if (document.getElementById('celebracio-overlay').classList.contains('actiu')) {
      tancarCelebracio(); history.pushState({}, '', ''); return;
    }
    if (document.getElementById('modal-edicio').classList.contains('open')) {
      tancarModal(); history.pushState({}, '', ''); return;
    }
    const vistaActiva = document.querySelector('.view.active');
    if (vistaActiva && vistaActiva.id !== 'view-inici') {
      showViewDirect('inici'); return;
    }
  });

  function anarABiblioteca() {
    showViewDirect('biblioteca').then(() => {
      renderTutorials();
    });
  }

  // ── CELEBRACIÓ ──
  const FRASES_CELEBRACIO = {
    40: "Ja has introduït 40 tutorials! Molt bé, mama!!",
    50: "Eiii, ja portes 50 tutorials! Vas bé, mama, vinga, no paris!!",
    60: "Toma yaaa! 60 tutorials! Estàs en ratxa, mama!!",
    70: "Oleee mama! Ja tens 70 tutorials! Viiinga!",
    80: "Uala! Súper màquina! Ja has arribat als 80 tutorials, enhorabona mama!!",
    81: "Si vols més frases d'aquestes, avisa'm, que te'n posaré més! Hehehe!"
  };

  function comprovarCelebracio(total) {
    const frase = FRASES_CELEBRACIO[total];
    if (!frase) return;
    document.getElementById('celebracio-text').textContent = frase;
    document.getElementById('celebracio-overlay').classList.add('actiu');
    if (total !== 81) llançarConfeti();
  }

  function tancarCelebracio() {
    document.getElementById('celebracio-overlay').classList.remove('actiu');
    if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
    const canvas = document.getElementById('confeti-canvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  function llançarConfeti() {
    const canvas = document.getElementById('confeti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#33495a','#e8a0b0','#f4c842','#4a90d9','#7bc67e','#eff1f2'];
    const particles = Array.from({length: 120}, () => ({
      x: Math.random() * canvas.width,
      y: -10 - Math.random() * 100,
      r: 4 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 3,
      vy: 2 + Math.random() * 3,
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 6
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.5);
        ctx.restore();
        p.x += p.vx; p.y += p.vy; p.rot += p.rotV;
      });
      if (particles.some(p => p.y < canvas.height + 20)) {
        confettiAnim = requestAnimationFrame(draw);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    }
    draw();
  }

  function ytVideoId(url) {
    if (!url) return null;
    const patterns = [
      /[?&]v=([^&#]+)/,
      /youtu\.be\/([^?&#]+)/,
      /youtube\.com\/embed\/([^?&#]+)/,
      /youtube\.com\/shorts\/([^?&#]+)/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  // DETECTAR NOM DE VÍDEO I CANAL DES DE LA URL
  async function detectarInfoVideo() {
    const url = document.getElementById('f-url').value.trim();
    const statusEl = document.getElementById('f-url-status');
    if (!url) return;

    // Només actua si els camps estan buits (no sobreescriu el que l'usuària ha posat)
    const nomVideoEl = document.getElementById('f-nom-video');
    const canalEl = document.getElementById('f-canal');
    if (nomVideoEl.value.trim() && canalEl.value.trim()) return;

    statusEl.textContent = 'Detectant informació del vídeo...';
    try {
      const res = await fetch(API_URL + '?accio=getVideoInfo&url=' + encodeURIComponent(url));
      const data = await res.json();
      if (data.ok) {
        if (!nomVideoEl.value.trim() && data.title) {
          nomVideoEl.value = data.title;
        }
        if (!canalEl.value.trim() && data.canal) {
          canalEl.value = data.canal;
        }
        statusEl.style.color = 'var(--success)';
        statusEl.textContent = '✓ Informació detectada automàticament';
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
      } else {
        statusEl.style.color = 'var(--text-muted)';
        statusEl.textContent = 'No s\'ha pogut detectar la informació. Omple els camps manualment.';
      }
    } catch (err) {
      statusEl.style.color = 'var(--text-muted)';
      statusEl.textContent = 'No s\'ha pogut detectar la informació. Omple els camps manualment.';
    }
  }

    // Comprovar que el nom no existeixi ja
    if (tutorials.some(t => (t.nom || '').trim().toLowerCase() === nom.toLowerCase())) {
      mostrarStatus('status-afegir', 'error', 'Mama, tria un altre nom, que ja tens un tutorial que es diu exactament igual!');
      const camp = document.getElementById('f-nom');
      camp.classList.add('input-error');
      camp.focus();
      return;

    const btn = document.getElementById('btn-guardar');

  async function guardarEdicio() {
    const nom = document.getElementById('edit-nom').value.trim();
    const categoria = document.getElementById('edit-categoria').value;
    const nomOriginal = document.getElementById('edit-nom-original').value;
    if (!nom || !categoria) {
      mostrarStatus('status-edicio', 'error', 'El nom i la categoria són obligatoris.');
      return;
    }
    // Comprovar que el nom no existeixi en un ALTRE tutorial
    if (tutorials.some(t => (t.nom || '').trim().toLowerCase() === nom.toLowerCase() && (t.nom || '').trim() !== nomOriginal)) {
      mostrarStatus('status-edicio', 'error', 'Mama, tria un altre nom, que ja tens un tutorial que es diu exactament igual!');
      const camp = document.getElementById('edit-nom');
      camp.classList.add('input-error');
      camp.focus();
      return;
    }
    const btn = document.getElementById('btn-editar');
    btn.disabled = true;
    btn.textContent = 'Guardant...';

    // Recollir camps de PROGRÉS
    const vegades = window._editVegades || 0;
    const feta = window._editFeta || 'no';
    const intencio = '';
    const nota = document.getElementById('act-nota').value.trim();
    const valoracio = document.querySelectorAll('#act-stars .star.on').length;

    const paramsProgres = new URLSearchParams({
      accio: 'actualitzar', nom: nomOriginal,
      intencio, notaSessio: nota, vegadesFet: vegades, valoracio
    });
    const paramsDades = new URLSearchParams({
      accio: 'editar', nomOriginal, nom, categoria,
      nomVideo: document.getElementById('edit-nom-video').value.trim(),
      canal: document.getElementById('edit-canal').value.trim(),
      compositor: document.getElementById('edit-compositor').value.trim(),
      interprets: document.getElementById('edit-interprets').value.trim(),
      genere: document.getElementById('edit-genere').value.trim(),
      url: document.getElementById('edit-url').value.trim(),
      feta,
      comentari: document.getElementById('edit-comentari').value.trim()
    });

    try {
      // Primer progrés (usa nomOriginal), després dades (pot canviar el nom)
      const resProgres = await fetch(API_URL + '?' + paramsProgres.toString());
      const dataProgres = await resProgres.json();
      if (!dataProgres.ok) {
        mostrarStatus('status-edicio', 'error', dataProgres.error || 'Error guardant el progrés.');
        btn.disabled = false; btn.textContent = 'Guardar'; return;
      }
      const resDades = await fetch(API_URL + '?' + paramsDades.toString());
      const dataDades = await resDades.json();
      if (!dataDades.ok) {
        mostrarStatus('status-edicio', 'error', dataDades.error || 'Error en editar les dades.');
        btn.disabled = false; btn.textContent = 'Guardar'; return;
      }
      mostrarStatus('status-edicio', 'ok', '✓ Canvis guardats!');
      setTimeout(() => { tancarModal(); carregarTutorials(); }, 1000);
    } catch(e) {
      mostrarStatus('status-edicio', 'error', 'Error de connexió.');
    }
    btn.disabled = false;
    btn.textContent = 'Guardar';
  }

  // UTILS
  function mostrarStatus(id, tipus, msg) {
    const el = document.getElementById(id);
    el.className = 'status-msg ' + tipus;
    el.textContent = msg;
    // Forçar reflow per re-disparar l'animació
    void el.offsetWidth;
    el.classList.add('shake');
    setTimeout(() => el.classList.remove('shake'), 500);
    // Scroll perquè el missatge sigui visible
    if (id === 'status-edicio') {
      const modal = el.closest('.modal');
      if (modal) modal.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    if (tipus === 'ok') setTimeout(() => el.className = 'status-msg', 4000);
  }

  // Tancar modal clicant fora
  document.getElementById('modal-edicio').addEventListener('click', function(e) {
    if (e.target === this) tancarModal();
  });

  // Treure marca d'error quan l'usuari modifica el camp del nom
  ['f-nom', 'edit-nom'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => el.classList.remove('input-error'));
  });

  // Inicialitzar
  inicialitzarPortada();

  // Registrar el Service Worker (per actualitzacions automàtiques de la PWA)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => {
        console.log('Service Worker no registrat:', err);
      });
    });
  }
</script>

      <div class="celebracio-emoji">🎉</div>
      <div class="celebracio-text" id="celebracio-text"></div>
      <button class="celebracio-btn" onclick="tancarCelebracio()">Tancar</button>
    </div>
  </div>
